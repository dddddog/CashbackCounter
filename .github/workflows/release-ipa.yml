name: Build Stable IPA (TrollStore Ready)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # 🧠 关键：降低 Swift 并发严格性（解决你之前 Sendable 问题）
      - name: Build App (stable build)
        run: |
          xcodebuild clean build \
          -scheme "CashbackCounter" \
          -configuration Release \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ONLY_ACTIVE_ARCH=NO \
          SWIFT_STRICT_CONCURRENCY=targeted \
          OTHER_SWIFT_FLAGS="-suppress-warnings" \
          | xcpretty || true

      # 📦 找到真正生成的 .app（比 DerivedData 稳定）
      - name: Locate .app
        id: app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      # 📦 打包 IPA（TrollStore 可用结构）
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r "${{ steps.app.outputs.app_path }}" Payload/
          zip -r CashbackCounter.ipa Payload

      # 📤 上传 Release（稳定版本）
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: CashbackCounter.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
