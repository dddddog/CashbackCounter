name: Build Stable IPA (TrollStore Fixed)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # 🧠 Step 1: clean build dir（避免旧缓存污染）
      - name: Clean DerivedData
        run: rm -rf build

      # 🧠 Step 2: 强制正确 build（关键）
      - name: Build App
        run: |
          xcodebuild clean build \
            -scheme "CashbackCounter" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_STRICT_CONCURRENCY=targeted

      # 🧠 Step 3: 强制检查 .app 是否存在（你之前失败的关键）
      - name: Verify .app exists
        run: |
          APP_PATH=$(find build -type d -name "*.app" | head -n 1)

          echo "Found app path: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "❌ ERROR: No .app found - build failed"
            exit 1
          fi

          # 🔥 检查 executable（关键！你现在的问题就在这里）
          if [ ! -f "$APP_PATH/$(basename "$APP_PATH" .app)" ]; then
            echo "❌ ERROR: No executable binary inside .app"
            ls -R "$APP_PATH"
            exit 1
          fi

          echo "app_path=$APP_PATH" >> $GITHUB_ENV

      # 📦 Step 4: 正确打包 IPA（标准 TrollStore 结构）
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r "$app_path" Payload/

          # 🔥 再次验证结构
          ls -R Payload

          zip -r CashbackCounter.ipa Payload

      # 📤 Step 5: Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: CashbackCounter.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
