name: Build TrollStore IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app (no signing)
        run: |
          xcodebuild \
          -scheme CashbackCounter \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          build

      - name: Locate .app
        run: |
          find . -name "*.app"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r $(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1) Payload/
          zip -r CashbackCounter-TrollStore.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore-IPA
          path: CashbackCounter-TrollStore.ipa
