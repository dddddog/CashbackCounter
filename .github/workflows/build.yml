name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Clean and Build App
      run: |
        PROJECT=$(find . -name "*.xcodeproj" | head -n 1)
        if [ -z "$PROJECT" ]; then
          echo "Error: Xcode project file not found!"
          exit 1
        fi
        
        echo "Found project: $PROJECT"
        xcodebuild clean build \
          -project "$PROJECT" \
          -scheme "CashbackCounter" \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          IPHONEOS_DEPLOYMENT_TARGET=16.0

    - name: Package to IPA (For TrollStore)
      run: |
        mkdir -p Payload
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "CashbackCounter.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -n 1)
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: Compiled .app file not found!"
          exit 1
        fi
        
        echo "Copying app from: $APP_PATH"
        cp -r "$APP_PATH" Payload/
        zip -r CashbackCounter.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CashbackCounter-TrollStore
        path: CashbackCounter.ipa
