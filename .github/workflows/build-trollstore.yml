name: Build TrollStore IPA
on:
  workflow_dispatch: # 支持手动点击触发
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-14 # macOS 14 自带 Xcode 15，支持 iOS 17 SDK
    steps:
      - name: 检出项目源码
        uses: actions/checkout@v4

      - name: 编译 Release 安装包（强制关闭签名）
        run: |
          xcodebuild build \
            -project CashbackCounter.xcodeproj \
            -scheme CashbackCounter \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 封装为标准 IPA 格式
        run: |
          mkdir -p Payload
          cp -R ./build_output/Build/Products/Release-iphoneos/CashbackCounter.app Payload/
          zip -q -r CashbackCounter_TrollStore.ipa Payload

      - name: 上传 IPA 安装包
        uses: actions/upload-artifact@v4
        with:
          name: CashbackCounter_TrollStore
          path: CashbackCounter_TrollStore.ipa
          retention-days: 30
